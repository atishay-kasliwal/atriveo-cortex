name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cortex-production
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Worker (cortex-api)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace packages (links @cortex/* into node_modules)
        run: npm install

      - name: Install playground dependencies
        run: npm install
        working-directory: playground

      - name: Install worker dependencies
        run: npm install
        working-directory: workers/cortex-api

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/cortex-api
          command: deploy

  deploy-ui:
    name: Pages (cortex-ui)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh Cloudflare OAuth token for pages:write access
        id: cf_token
        run: |
          RESP=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.WRANGLER_REFRESH_TOKEN }}" \
            -d "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          TOKEN=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "$TOKEN" ]; then echo "Token refresh failed: $RESP"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Install UI dependencies
        run: npm install
        working-directory: apps/cortex-ui

      - name: Build for Cloudflare Pages
        run: npm run build:pages
        working-directory: apps/cortex-ui
        env:
          VITE_API_URL: /api

      - name: Remove macOS AppleDouble artifacts
        run: npm run clean:pages-artifacts
        working-directory: apps/cortex-ui

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy Pages
        run: wrangler pages deploy dist --project-name=cortex-ui --branch=production
        working-directory: apps/cortex-ui
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.token }}
