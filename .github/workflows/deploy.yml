name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cortex-production
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Worker (cortex-api)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace packages (links @cortex/* into node_modules)
        run: npm install

      - name: Install playground dependencies
        run: npm install
        working-directory: playground

      - name: Install worker dependencies
        run: npm install
        working-directory: workers/cortex-api

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/cortex-api
          command: deploy

  deploy-ui:
    name: Pages (cortex-ui)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install UI dependencies
        run: npm install
        working-directory: apps/cortex-ui

      - name: Build for Cloudflare Pages
        run: npm run build:pages
        working-directory: apps/cortex-ui
        env:
          VITE_API_URL: /api

      - name: Remove macOS AppleDouble artifacts
        run: npm run clean:pages-artifacts
        working-directory: apps/cortex-ui

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/cortex-ui
          command: pages deploy dist --project-name=cortex-ui --branch=production
